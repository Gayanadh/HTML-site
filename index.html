<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK | Resume Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;    /* Professional Blue */
            --accent: #FF8C00;     /* Energetic Orange */
            --focus-border: #2E74B5; /* Deep Blue for Focus */
            --input-bg: #EEF4FF;    /* Light Blue Tint */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 50px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .brand-logo { 
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 10px;
            letter-spacing: 2px;
        }

        .content { 
            flex: 1;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 3.5rem; 
            margin: 0;
            background: linear-gradient(to right, #fff, #d1d1d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { 
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .hub-card { 
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 45px; 
            border-radius: 40px; 
            width: 100%;
            max-width: 550px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: left;
        }

        .step { margin-bottom: 30px; }

        .step label {
            display: block;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Updated File Input Style */
        input[type="file"] {
            width: 100%;
            padding: 15px;
            background-color: var(--input-bg); /* Light Blue Tint */
            border: 2px dashed #cbd5e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="file"]:focus {
            outline: none;
            border-color: var(--focus-border);
            background-color: #fff;
        }

        /* Updated Textarea Style */
        textarea { 
            width: 100%; 
            height: 140px; 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px solid transparent; 
            background-color: var(--input-bg); /* Light Blue Tint */
            font-family: inherit;
            box-sizing: border-box;
            resize: none;
            transition: all 0.3s ease;
        }
        
        textarea:focus { 
            outline: none; 
            border-color: var(--focus-border); /* Blue Border on Focus */
            background-color: #fff;
            box-shadow: 0 0 10px rgba(46, 116, 181, 0.1);
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }

        .btn { 
            padding: 15px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 700; 
            color: white; 
            transition: 0.3s;
        }

        .btn-word { background: var(--primary); }
        .btn-pdf { background: var(--accent); }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        #statusText { 
            margin-top: 25px; 
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <div class="brand-logo">GK</div>
    <div style="font-size: 14px; opacity: 0.8;">Professional Career Tools</div>
</header>

<div class="content">
    <h1>Resume Hub</h1>
    <p class="tagline">Upgrade your career in just a few clicks!</p>

    <div class="hub-card">
        <div class="step">
            <label>1. Upload Original Resume</label>
            <input type="file" id="resumeUpload" accept=".docx">
        </div>
        
        <div class="step">
            <label>2. Describe Your Updates</label>
            <textarea id="updates" placeholder="e.g. Add 'Advanced Python Skills' to the skills section..."></textarea>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-word" onclick="processResume('docx')">Get Word Doc</button>
            <button class="btn btn-pdf" onclick="processResume('pdf')">Download PDF</button>
        </div>
        
        <p id="statusText"></p>
    </div>
</div>

<script>
    async function processResume(format) {
        const fileInput = document.getElementById('resumeUpload');
        const updates = document.getElementById('updates').value;
        const statusText = document.getElementById('statusText');

        if (!fileInput.files[0]) {
            statusText.style.color = "#d9534f";
            statusText.innerText = "Please select a file to continue.";
            return;
        }

        statusText.style.color = "#4A90E2";
        statusText.innerText = "Processing your request at the Hub...";
        
        const endpoint = format === 'pdf' ? '/upgrade-pdf' : '/upgrade';
        const formData = new FormData();
        formData.append('resume', fileInput.files[0]);
        formData.append('updates', updates);

        try {
            const response = await fetch('https://html-site-4emx.onrender.com' + endpoint, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Resume_Hub_Updated.${format}`;
                document.body.appendChild(a);
                a.click();
                statusText.style.color = "#2E7D32";
                statusText.innerText = "Done! Your updated resume is ready.";
            } else {
                statusText.innerText = "Error: Hub is temporarily unavailable.";
            }
        } catch (error) {
            statusText.innerText = "Hub is waking up. Try again in 30 seconds!";
        }
    }
</script>

</body>
</html>
