<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK | Resume Hub - FAANG & ATS Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2E74B5;    /* Deep Blue for FAANG professionalism */
            --accent: #FF8C00;     /* Energetic Orange */
            --input-bg: #EEF4FF;    /* Light Blue Tint requested */
            --focus-border: #2E74B5;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        body { 
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 50px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .brand-logo { 
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 10px;
            letter-spacing: 2px;
        }

        .content { 
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 3.2rem; 
            margin: 0;
            background: linear-gradient(to right, #fff, #d1d1d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { 
            font-size: 1.1rem;
            margin-top: 10px;
            margin-bottom: 30px;
            opacity: 0.9;
            font-weight: 400;
        }

        .ats-badge {
            background: #27AE60;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .hub-card { 
            background: rgba(255, 255, 255, 0.98);
            color: #333;
            padding: 40px; 
            border-radius: 30px; 
            width: 100%;
            max-width: 550px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .step { margin-bottom: 25px; text-align: left; }

        .step label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Light Blue Tint Inputs */
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="file"]:focus {
            outline: none;
            border-color: var(--focus-border);
            background-color: #fff;
        }

            height: 130px; 
            padding: 15px;
