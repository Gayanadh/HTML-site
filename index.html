<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Creations - Resume Builder</title>
    <style>
        body { background-color: skyblue; font-family: Arial, sans-serif; margin: 0; color: white; text-align: center; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0,0,0,0.1); }
        .logo-box { height: 50px; width: 50px; background: #2e7d32; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .content { padding: 40px; }
        h1 { color: blue; font-family: "Times New Roman", serif; font-size: 42px; }
        .main-card { background: white; color: #333; padding: 30px; border-radius: 20px; display: inline-block; width: 90%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        textarea { width: 95%; height: 120px; margin: 20px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; background-color: darkblue; color: white; transition: 0.3s; }
        .btn:hover { background-color: blue; transform: scale(1.05); }
        #statusText { margin-top: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><img src="logo.png" alt="G"></div>
    <div style="background:white; color:black; padding:6px 12px; border-radius:5px; font-weight:bold;">⚙️ SETTINGS</div>
</header>

<div class="content">
    <h1>Resume Builder</h1>
    <div class="main-card">
        <p><strong>Step 1:</strong> Upload your current Resume</p>
        <input type="file" id="resumeUpload" accept=".docx">
        
        <p style="margin-top:20px;"><strong>Step 2:</strong> Kindly provide your updates in resume</p>
        <textarea id="updates" placeholder="e.g. Change phone to 000000 and add Project Manager role..."></textarea>
        
        <br>
        <button class="btn" onclick="processResume()">Upgrade Resume</button>
        <p id="statusText"></p>
    </div>
</div>

<script>
    async function processResume() {
        const fileInput = document.getElementById('resumeUpload');
        const updates = document.getElementById('updates').value;
        const statusText = document.getElementById('statusText');

        if (!fileInput.files[0]) {
            alert("Please upload a .docx file first!");
            return;
        }

        statusText.innerText = "Connecting to backend... please wait.";

        const formData = new FormData();
        formData.append('resume', fileInput.files[0]);
        formData.append('updates', updates);

        try {
            // This connects to your live Render server
            const response = await fetch('https://html-site-4emx.onrender.com/upgrade', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Upgraded_Resume.docx";
                document.body.appendChild(a);
                a.click();
                statusText.innerText = "Done! Your upgraded resume downloaded.";
            } else {
                statusText.innerText = "Server error. Make sure your Render app is live.";
            }
        } catch (error) {
            statusText.innerText = "Error connecting to server. Render might be 'sleeping'—wait 1 minute and try again.";
            console.error(error);
        }
    }
</script>

</body>
</html>
