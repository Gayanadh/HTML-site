<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Hub | AI Career Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ORIGINAL DEEP NAVY & GOLD PALETTE */
        :root {
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.8);
            --primary: #3b82f6;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --border: rgba(245, 158, 11, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #020617, #0f172a); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 2rem; 
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 3rem; }
        header h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }
        
        .glass-panel { 
            background: var(--panel-bg); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 3rem; 
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        
        /* ATS METER - ORIGINAL GOLD STYLE */
        .ats-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 1.5rem 2.5rem; 
            border-radius: 18px; 
            margin-bottom: 2.5rem; 
            border-left: 6px solid var(--accent-gold);
        }
        .ats-info h3 { color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; }
        .ats-score { font-size: 3rem; font-weight: 800; color: var(--success); }
        
        /* FORM INPUTS */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 0.8rem; font-weight: 600; color: var(--text-main); }
        
        input[type="text"], select, textarea { 
            width: 100%; padding: 1rem; border-radius: 12px; 
            background: rgba(2, 6, 23, 0.6); border: 1px solid var(--border); 
            color: white; font-size: 1rem;
        }

        .file-upload-wrapper {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-upload-wrapper:hover { border-color: var(--accent-gold); background: rgba(245, 158, 11, 0.05); }

        /* BUTTONS */
        .btn-row { display: flex; gap: 1.2rem; margin-top: 2.5rem; }
        .btn { 
            padding: 1.2rem; border-radius: 12px; font-weight: 700; cursor: pointer; 
            border: none; transition: 0.3s; flex: 1; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-primary { background: var(--accent-gold); color: #020617; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
        .btn-architect { 
            background: linear-gradient(135deg, #7c3aed, #db2777); 
            color: white; 
            position: relative;
        }
        .btn-architect::after { 
            content: 'EDIT'; position: absolute; top: -10px; right: -10px; 
            background: var(--success); font-size: 0.7rem; padding: 3px 8px; border-radius: 20px;
        }

        .status-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 12px; text-align: center; display: none; border: 1px solid transparent; }
        .rebuild-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Resume Hub</h1>
        <p style="color: var(--text-muted);">AI-Powered Career Optimization</p>
    </header>

    <div class="glass-panel">
        <div class="ats-container">
            <div class="ats-info">
                <h3>ATS Score</h3>
                <p id="scoreTag" style="font-size: 0.85rem; color: var(--text-muted);">Analysis pending...</p>
            </div>
            <div class="ats-score" id="scoreText">0%</div>
        </div>

        <form id="resumeForm">
            <div class="form-grid">
                <div class="form-group"><label>Name</label><input type="text" id="inp-name"></div>
                <div class="form-group"><label>Template</label>
                    <select id="template">
                        <option value="google">Standard Professional</option>
                        <option value="creative">Creative Modern</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Resume File</label>
                    <div class="file-upload-wrapper">
                        <span id="fileNameDisplay">Attach .docx or .pdf</span>
                        <input type="file" id="resumeUpload" name="resume" accept=".docx,.pdf" style
