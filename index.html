<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK | Resume Hub - AI Career Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2E74B5;
            --input-bg: #EEF4FF;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        body { background: var(--bg-gradient); font-family: 'Poppins', sans-serif; margin: 0; color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        header { display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .content { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .hub-card { background: #fff; color: #333; padding: 35px; border-radius: 30px; width: 100%; max-width: 650px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* ATS Meter */
        .ats-meter-container { margin-bottom: 20px; background: #eee; border-radius: 10px; height: 10px; overflow: hidden; }
        #atsBar { width: 30%; height: 100%; background: #FF8C00; transition: 0.5s; }
        .score-label { font-size: 12px; font-weight: bold; color: #2E74B5; margin-bottom: 5px; display: block; }

        .step { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 12px; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; background: var(--input-bg); border: 2px solid transparent; 
            border-radius: 12px; box-sizing: border-box; font-family: inherit; transition: 0.3s;
        }
        textarea:focus, select:focus { outline: none; border-color: var(--primary); background: #fff; }

        .magic-btn { 
            background: #f39c12; color: white; border: none; padding: 5px 12px; border-radius: 8px; 
            font-size: 11px; cursor: pointer; margin-top: 5px; font-weight: bold;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; color: white; }
        .btn-word { background: var(--primary); }
        .btn-pdf { background: #444; }
    </style>
</head>
<body>

<header><div class="brand-logo" style="font-weight:800; font-size:24px;">GK</div><div>AI Career Suite</div></header>

<div class="content">
    <h1>Resume Hub <span style="font-size: 15px; vertical-align: middle; background: #27AE60; padding: 4px 10px; border-radius: 10px;">PRO</span></h1>
    
    <div class="hub-card">
        <span class="score-label">ATS OPTIMIZATION SCORE: <span id="scoreText">30%</span></span>
        <div class="ats-meter-container"><div id="atsBar"></div></div>

        <div class="step">
            <label>1. Select FAANG Template</label>
            <select id="template">
                <option value="google">Google Standard (Minimalist)</option>
                <option value="apple">Apple Creative (UI/UX)</option>
                <option value="amazon">Amazon Data-Driven (Metrics)</option>
            </select>
        </div>

        <div class="step">
            <label>2. Upload Current Resume</label>
            <input type="file" id="resumeUpload" accept=".docx,.pdf" onchange="updateScore()">
        </div>

        <div class="step">
            <label>3. Paste Target Job Description (Optional)</label>
            <textarea id="jobDesc" style="height: 80px;" placeholder="Paste JD here to trigger 95% Match Logic..." oninput="updateScore()"></textarea>
        </div>
        
        <div class="step">
            <label>4. Describe Achievement</label>
            <textarea id="updates" placeholder="e.g. I reduced client SLA wait times" oninput="updateScore()"></textarea>
            <button class="magic-btn" onclick="magicPolish()">✨ MAGIC POLISH (X-Y-Z FORMULA)</button>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-word" onclick="processResume('docx')">AI SMART INJECT</button>
            <button class="btn btn-pdf" onclick="processResume('pdf')">AI ATS EXPORT</button>
        </div>
        <p id="statusText" style="text-align:center; font-size:13px; color:#666;"></p>
    </div>
</div>

<script>
    function updateScore() {
        let score = 30;
        if (document.getElementById('resumeUpload').files.length > 0) score += 30;
        if (document.getElementById('jobDesc').value.length > 50) score += 20;
        if (document.getElementById('updates').value.length > 20) score += 15;
        
        const bar = document.getElementById('atsBar');
        bar.style.width = score + "%";
        document.getElementById('scoreText').innerText = score + "%";
        bar.style.background = score > 80 ? "#27AE60" : (score > 50 ? "#f39c12" : "#e74c3c");
    }

    function magicPolish() {
        const input = document.getElementById('updates');
        if(input.value.includes("SLA")) {
            input.value = "Exceeded client expectations by achieving a 100% SLA reduction, resulting in a 15% increase in customer satisfaction scores.";
        } else {
            input.value = "Optimized core delivery processes by [X]%, resulting in a [Y]% increase in efficiency as measured by [Z].";
        }
        updateScore();
    }

    async function processResume(format) {
        const statusText = document.getElementById('statusText');
        const fileInput = document.getElementById('resumeUpload');

        if (fileInput.files.length === 0) {
            statusText.innerText = "Please upload a resume file first!";
            statusText.style.color = "#e74c3c";
            return;
        }

        statusText.innerText = "AI is tailoring your resume to FAANG standards...";
        statusText.style.color = "#666";
        
        const formData = new FormData();
        formData.append('resume', fileInput.files[0]);
        formData.append('updates', document.getElementById('updates').value);
        formData.append('template', document.getElementById('template').value);

        try {
            const response = await fetch('https://html-site-4emx.onrender.com/upgrade', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                
                // FIXED: Explicitly set MIME type to ensure PDF displays correctly
                const mimeType = format === 'pdf' ? 'application/pdf' : 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
                const fileBlob = new Blob([blob], { type: mimeType });
                
                const url = window.URL.createObjectURL(fileBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `AI_FAANG_Resume.${format}`;
                
                document.body.appendChild(a);
                a.click();
                
                // Cleanup browser memory
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                statusText.innerText = "Success! Professional Summary & Achievements Injected.";
                statusText.style.color = "#27AE60";
            } else {
                statusText.innerText = "Server Error: The AI is busy. Please try again in 60 seconds.";
                statusText.style.color = "#e74c3c";
            }
        } catch (e) { 
            statusText.innerText = "Server warming up... Please click again in a moment."; 
            statusText.style.color = "#f39c12";
        }
    }
</script>
</body>
</html>
