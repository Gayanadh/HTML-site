<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK | Resume Hub - AI FAANG Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2E74B5;    /* Professional Deep Blue */
            --accent: #FF8C00;     /* Energetic Orange */
            --input-bg: #EEF4FF;    /* Light Blue Tint */
            --focus-border: #2E74B5;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        body { 
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 50px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .brand-logo { 
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 10px;
            letter-spacing: 2px;
        }

        .content { 
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 3.2rem; 
            margin: 0;
            background: linear-gradient(to right, #fff, #d1d1d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { 
            font-size: 1.1rem;
            margin-top: 10px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .ats-badge {
            background: #27AE60;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .hub-card { 
            background: rgba(255, 255, 255, 0.98);
            color: #333;
            padding: 40px; 
            border-radius: 30px; 
            width: 100%;
            max-width: 550px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .step { margin-bottom: 25px; text-align: left; }

        .step label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 13px;
            text-transform: uppercase;
        }

        /* Themed Inputs with Light Blue Tint */
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="file"]:focus {
            outline: none;
            border-color: var(--focus-border);
            background-color: #fff;
        }

        textarea { 
            width: 100%; 
            height: 130px; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid transparent; 
            background-color: var(--input-bg);
            font-family: inherit;
            box-sizing: border-box;
            resize: none;
            transition: all 0.3s ease;
        }
        
        textarea:focus { 
            outline: none; 
            border-color: var(--focus-border);
            background-color: #fff;
            box-shadow: 0 0 12px rgba(46, 116, 181, 0.15);
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }

        .btn { 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 700; 
            color: white; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-word { background: var(--primary); }
        .btn-pdf { background: #444; }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        #statusText { 
            margin-top: 20px; 
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            color: #555;
        }

        .faang-footer {
            margin-top: 15px;
            font-size: 11px;
            color: var(--primary);
            font-weight: bold;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<header>
    <div class="brand-logo">GK</div>
    <div style="font-size: 14px; opacity: 0.8;">FAANG Career Engine</div>
</header>

<div class="content">
    <div class="ats-badge">✓ 90%+ ATS SCORE GUARANTEED</div>
    <h1>Resume Hub</h1>
    <p class="tagline">AI-Powered FAANG Semantic Injection</p>

    <div class="hub-card">
        <div class="step">
            <label>1. Upload Resume (.docx or .pdf)</label>
            <input type="file" id="resumeUpload" accept=".docx,.pdf">
        </div>
        
        <div class="step">
            <label>2. Describe Achievement to Inject</label>
            <textarea id="updates" placeholder="e.g. Led a team of 5 to reduce server latency by 40%..."></textarea>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-word" onclick="processResume('docx')">AI SMART INJECT</button>
            <button class="btn btn-pdf" onclick="processResume('pdf')">AI ATS EXPORT</button>
        </div>

        <div class="faang-footer">
            Semantic Section Discovery • Arial Font • ATS Optimized
        </div>
        
        <p id="statusText"></p>
    </div>
</div>

<script>
    async function processResume(format) {
        const fileInput = document.getElementById('resumeUpload');
        const updates = document.getElementById('updates').value;
        const statusText = document.getElementById('statusText');

        if (!fileInput.files[0]) {
            statusText.style.color = "#d9534f";
            statusText.innerText = "Please select a file to start AI injection.";
            return;
        }

        statusText.style.color = "#2E74B5";
        statusText.innerText = "AI is scanning sections for injection... please wait.";
        
        const endpoint = format === 'pdf' ? '/upgrade-pdf' : '/upgrade';
        const formData = new FormData();
        formData.append('resume', fileInput.files[0]);
        formData.append('updates', updates);

        try {
            // Pointing to your live Render backend
            const response = await fetch('https://html-site-4emx.onrender.com' + endpoint, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `AI_Optimized_Resume.${format}`;
                document.body.appendChild(a);
                a.click();
                statusText.style.color = "#27AE60";
                statusText.innerText = "Success! Achievement injected and optimized.";
            } else {
                statusText.style.color = "#d9534f";
                statusText.innerText = "AI Engine error. Check your file format.";
            }
        } catch (error) {
            statusText.innerText = "Hub is waking up. Try again in 30 seconds!";
        }
    }
</script>

</body>
</html>
