<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK | Executive Resume Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #D4AF37; --bg: #0A0B10; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: #fff; margin: 0; padding: 40px 20px; }
        .wrapper { max-width: 700px; margin: 0 auto; }
        h1 { font-family: 'Playfair Display', serif; font-size: 48px; color: var(--accent); margin-bottom: 5px; }
        .tagline { opacity: 0.6; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; display: block; }
        
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; backdrop-filter: blur(20px); }
        .label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: block; }
        
        input, textarea, select { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid #222; border-radius: 12px; color: #fff; margin-bottom: 25px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        .btn-main { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #000; border: none; padding: 20px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); }
        
        #status { text-align: center; margin-top: 25px; font-size: 14px; color: #666; font-style: italic; }
        .progress-container { height: 4px; background: #111; border-radius: 2px; margin: 20px 0; overflow: hidden; }
        #progressBar { height: 100%; width: 0%; background: var(--accent); transition: 1s ease; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Resume Hub</h1>
        <span class="tagline">The Executive AI Career Suite</span>
        
        <div class="card">
            <div class="progress-container"><div id="progressBar"></div></div>
            
            <label class="label">Step 1: Placement Strategy</label>
            <select id="template">
                <option value="google">Google: Data-Driven XYZ</option>
                <option value="apple">Apple: Visionary Storytelling</option>
                <option value="amazon">Amazon: Leadership Metrics</option>
            </select>

            <label class="label">Step 2: Source File</label>
            <input type="file" id="resumeUpload" onchange="document.getElementById('progressBar').style.width='50%'">

            <label class="label">Step 3: Target Role Analysis</label>
            <textarea id="jobDesc" rows="6" placeholder="Paste the Job Description..." oninput="document.getElementById('progressBar').style.width='80%'"></textarea>

            <button class="btn-main" onclick="initiateRebuild()">🔥 COMMENCE EXECUTIVE REBUILD</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        const API = "https://resume-hub-3eeb.onrender.com";
        async function initiateRebuild() {
            const status = document.getElementById('status');
            const file = document.getElementById('resumeUpload').files[0];
            const jd = document.getElementById('jobDesc').value;

            if (!file || !jd) { status.innerText = "Error: Missing document or job description."; return; }

            status.innerHTML = "✨ <strong>Engine active.</strong> Redesigning your professional identity...";
            
            const fd = new FormData();
            fd.append('resume', file);
            fd.append('jobDesc', jd);
            fd.append('template', document.getElementById('template').value);

            try {
                const res = await fetch(`${API}/rebuild`, { method: 'POST', body: fd });
                if (res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a');
                    a.href = window.URL.createObjectURL(blob);
                    a.download = `Executive_Resume.pdf`;
                    a.click();
                    status.innerHTML = "✅ <strong>Complete.</strong> Your upgraded resume has been generated.";
                } else { status.innerText = "Error: The AI server encountered an issue."; }
            } catch (e) { status.innerText = "Connection error. Re-attempting in 5s..."; }
        }
    </script>
</body>
</html>
