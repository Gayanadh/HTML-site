<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK creations</title>
    <style>
        /* 1. Page Background and General Text */
        body { 
            background-color: skyblue; 
            font-family: Arial, sans-serif;
            margin: 0;
            color: white; /* All text except headings will be white */
        }

        /* 2. Top Bar Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.1); /* Subtle dark bar */
        }

        /* Styling for your Green "G" Logo */
        .logo-box {
            height: 50px; /* Adjust this to make the logo bigger or smaller */
            display: flex;
            align-items: center;
        }

        .logo-box img {
            height: 100%;
            width: auto;
            border-radius: 8px; /* Optional: adds slightly rounded corners to your green box */
            display: block;
        }

        .settings-bar {
            cursor: pointer;
            font-size: 14px;
            background: white;
            color: black;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 3. Main Content */
        .content {
            padding: 50px 20px;
            text-align: center;
        }

        h1 { 
            color: blue; 
            font-family: "Times New Roman", serif; 
            font-size: 42px; 
            margin-top: 0;
        }

        textarea { 
            display: block;
            margin: 20px auto;
            width: 80%;
            max-width: 400px;
            height: 120px;
            border-radius: 10px;
            border: none;
            padding: 15px;
            font-size: 16px;
        }

        button { 
            color: white; 
            background-color: darkblue; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 25px; /* Rounded button style */
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        button:hover {
            background-color: blue;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="GK Green Logo">
        </div>
        <div class="settings-bar">⚙️ SETTINGS</div>
    </header>

    <div class="content">
        <h1>Hi Everyone</h1>
        <p>Welcome to my website</p>
        
        <textarea placeholder="Kindly provide your resume!"></textarea>
        
        <button type="button">Submit Resume</button>
    </div>

</body>
</html>
