<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK | Resume Hub - AI Career Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --primary: #2E74B5; --input-bg: #EEF4FF; --bg: linear-gradient(135deg,#1e3c72,#2a5298); }
  body { background:var(--bg); font-family:'Poppins',sans-serif; margin:0; color:#fff; display:flex; flex-direction:column; min-height:100vh; }
  header { display:flex; justify-content:space-between; padding:20px 50px; background:rgba(255,255,255,0.1); backdrop-filter:blur(15px); }
  .content { padding:40px 20px; display:flex; flex-direction:column; align-items:center; }
  .hub-card { background:#fff; color:#333; padding:35px; border-radius:30px; width:100%; max-width:650px; box-shadow:0 20px 50px rgba(0,0,0,0.3); }
  .ats-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .score-label { font-size:12px; font-weight:700; color:var(--primary); }
  .ats-meter { background:#eee; border-radius:10px; height:10px; overflow:hidden; margin-bottom:20px; }
  #atsBar { width:30%; height:100%; background:#FF8C00; transition:.5s; }
  .step { margin-bottom:20px; }
  label { display:block; font-weight:700; font-size:12px; color:var(--primary); text-transform:uppercase; margin-bottom:8px; cursor:pointer; }
  input,textarea,select { width:100%; padding:12px; background:var(--input-bg); border:2px solid transparent; border-radius:12px; box-sizing:border-box; font-family:inherit; font-size:13px; transition:.3s; }
  textarea:focus,select:focus,input:focus { outline:none; border-color:var(--primary); background:#fff; }
  .polish-row { display:flex; gap:10px; align-items:flex-start; }
  .polish-row textarea { flex:1; }
  .magic-btn { background:#f39c12; color:#fff; border:none; padding:11px 16px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background .2s; }
  .magic-btn:hover { background:#d68910; }
  .magic-btn:disabled { background:#ccc; cursor:not-allowed; }
  .heading-tag { display:none; align-items:center; gap:6px; margin-top:8px; font-size:11px; }
  .heading-tag.show { display:flex; }
  .heading-badge { background:#e8f4ff; color:#1a5276; border:1px solid #aed6f1; padding:3px 10px; border-radius:20px; font-weight:700; font-size:11px; }
  .vision-badge { background:#f0e8ff; color:#4a1e8a; border:1px solid #c5a8f5; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
  .btn-group { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
  .btn { padding:15px; border:none; border-radius:12px; cursor:pointer; font-weight:700; color:#fff; font-size:14px; transition:opacity .2s; }
  .btn:hover { opacity:.88; }
  .btn-word { background:var(--primary); }
  .btn-pdf  { background:#444; }
  #statusText { text-align:center; font-size:12px; color:#666; padding-top:10px; min-height:22px; line-height:1.5; }
  .ai-label { font-size:10px; color:#888; margin-top:6px; display:flex; align-items:center; gap:4px; }
</style>
</head>
<body>
<header>
  <div style="font-weight:800;font-size:24px">GK</div>
  <div>AI Career Suite <span class="vision-badge">Vision Powered</span></div>
</header>

<div class="content">
  <h1>Resume Hub <span style="font-size:15px;vertical-align:middle;background:#27AE60;padding:4px 10px;border-radius:10px">PRO</span></h1>
  <div class="hub-card">
    <div class="ats-row">
      <span class="score-label">ATS Score: <span id="scoreText">30%</span></span>
      <span class="vision-badge">Claude Vision reads your layout</span>
    </div>
    <div class="ats-meter"><div id="atsBar"></div></div>

    <div class="step">
      <label for="template">1. Select FAANG Template</label>
      <select id="template" onchange="resetHeading()">
        <option value="google">Google Standard (Minimalist)</option>
        <option value="apple">Apple Creative (UI/UX)</option>
        <option value="amazon">Amazon Data-Driven (Metrics)</option>
      </select>
    </div>

    <div class="step">
      <label for="resumeUpload">2. Upload Resume</label>
      <input type="file" id="resumeUpload" accept=".docx,.pdf" onchange="updateScore()">
      <div class="ai-label">Claude Vision will read every heading, text box, and column in your file</div>
    </div>

    <div class="step">
      <label for="jobDesc">3. Paste Job Description</label>
      <textarea id="jobDesc" style="height:70px" placeholder="Paste JD here..." oninput="updateScore()"></textarea>
    </div>

    <div class="step">
      <label for="updates">4. Describe Your Update</label>
      <div class="polish-row">
        <textarea id="updates" rows="3"
          placeholder="e.g. I reduced SLA breaches&#10;e.g. I earned AWS certification&#10;e.g. I speak French"
          oninput="updateScore(); resetHeading()"></textarea>
        <button class="magic-btn" id="polishBtn" type="button" onclick="magicPolish()">AI Polish</button>
      </div>
      <div class="heading-tag" id="headingTag">
        <span style="color:#888;font-size:11px">Claude chose heading:</span>
        <span class="heading-badge" id="headingBadge"></span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-word" type="button" onclick="processResume('docx')">AI Smart Inject</button>
      <button class="btn btn-pdf"  type="button" onclick="processResume('pdf')">AI ATS Export</button>
    </div>
    <p id="statusText" aria-live="polite"></p>
  </div>
</div>

<script>
const API_BASE = "https://resume-hub-3eeb.onrender.com";
let chosenHeading = "";
let cachedStructure = "";

function updateScore() {
  let s = 30;
  if (document.getElementById('resumeUpload').files.length > 0) s += 30;
  if (document.getElementById('jobDesc').value.length > 50) s += 20;
  if (document.getElementById('updates').value.length > 10) s += 15;
  const bar = document.getElementById('atsBar');
  bar.style.width = s + "%";
  bar.style.background = s > 80 ? "#27AE60" : s > 50 ? "#f39c12" : "#e74c3c";
  document.getElementById('scoreText').innerText = s + "%";
}

function resetHeading() {
  chosenHeading = "";
  cachedStructure = "";
  document.getElementById('headingTag').classList.remove('show');
}

async function magicPolish() {
  const input    = document.getElementById('updates');
  const btn      = document.getElementById('polishBtn');
  const status   = document.getElementById('statusText');
  const fileInput = document.getElementById('resumeUpload');

  if (!input.value.trim()) { status.innerText = "Write something in step 4 first."; return; }
  if (!fileInput.files[0]) { status.innerText = "Upload your resume first so Claude can read its structure."; return; }

  btn.disabled = true;
  btn.innerText = "Reading...";
  status.innerText = "Claude Vision is analyzing your resume layout, headings and columns...";

  const form = new FormData();
  form.append('resume',   fileInput.files[0]);
  form.append('text',     input.value);
  form.append('template', document.getElementById('template').value);

  try {
    const res  = await fetch(`${API_BASE}/polish`, { method:'POST', body:form });
    const data = await res.json();

    input.value    = data.polished_text;
    chosenHeading  = data.heading || "Achievements";
    cachedStructure = JSON.stringify(data.resume_structure || {});

    document.getElementById('headingBadge').innerText = chosenHeading;
    document.getElementById('headingTag').classList.add('show');
    status.innerText = `Claude read your resume and chose: "${chosenHeading}"`;
    updateScore();
  } catch(e) {
    status.innerText = "Could not reach server. Try again in 30s.";
  } finally {
    btn.disabled = false;
    btn.innerText = "AI Polish";
  }
}

async function processResume(format) {
  const status    = document.getElementById('statusText');
  const fileInput = document.getElementById('resumeUpload');
  if (!fileInput.files[0]) { status.innerText = "Please upload a resume first."; return; }

  let finalFormat = format;
  if (fileInput.files[0].name.toLowerCase().endsWith('.pdf') && format === 'docx') finalFormat = 'pdf';

  status.innerText = "Injecting update into the correct heading...";

  const form = new FormData();
  form.append('resume',   fileInput.files[0]);
  form.append('updates',  document.getElementById('updates').value);
  form.append('template', document.getElementById('template').value);
  form.append('format',   finalFormat);
  if (chosenHeading)   form.append('heading',          chosenHeading);
  if (cachedStructure) form.append('resume_structure', cachedStructure);

  try {
    const res = await fetch(`${API_BASE}/upgrade`, { method:'POST', body:form });
    if (res.ok) {
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Optimized_Resume.${finalFormat}`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      status.innerText = `Done! Placed under "${chosenHeading || 'Achievements'}".`;
    } else {
      status.innerText = "Server error. Please try again.";
    }
  } catch(e) {
    status.innerText = "Server warming up — retry in 30 seconds.";
  }
}
</script>
</body>
</html>
